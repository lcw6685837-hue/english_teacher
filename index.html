<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿀잼 구동사 마스터 V2.4 (완결판)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        .card-flip { transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f00; opacity: 0.7; animation: confetti-fall 2s ease-out forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(-100px) rotateZ(0deg); } 100% { transform: translateY(100vh) rotateZ(720deg); } }
        .stage-btn.active { background-color: #2563EB; color: white; }

        /* AI 선생님 말하기 효과 */
        .teacher-avatar.speaking {
            box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.8);
            transition: box-shadow 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-blue-50 font-sans flex items-center justify-center min-h-screen py-8">

    <div id="app" class="container mx-auto p-4 max-w-2xl">
        <header class="text-center mb-6">
            <h1 class="text-4xl font-extrabold text-blue-600">🚀 꿀잼 구동사 마스터 V2.4 🚀</h1>
            <p class="text-gray-600 mt-2">AI 선생님과 함께 원어민에 도전하세요!</p>
        </header>

        <div class="flex justify-center gap-4 mb-6">
            <button id="learn-mode-btn" class="px-6 py-2 bg-blue-500 text-white font-bold rounded-full shadow-lg transform hover:scale-105 transition duration-300">🎓 학습 모드</button>
            <button id="quiz-mode-btn" class="px-6 py-2 bg-gray-300 text-gray-700 font-bold rounded-full shadow-lg transform hover:scale-105 transition duration-300">🧠 퀴즈 모드</button>
        </div>

        <!-- 스테이지 선택 영역 -->
        <div id="stage-selection-container" class="mb-6">
            <h2 class="text-center text-xl font-bold text-gray-700 mb-3">단계를 선택하세요</h2>
            <div id="stage-buttons" class="flex flex-wrap justify-center gap-3">
                <!-- 단계 버튼 동적 생성 -->
            </div>
        </div>

        <!-- 학습 모드 화면 -->
        <div id="learn-container" class="hidden">
            <div id="card-container" class="relative h-[500px]">
                <!-- 동적으로 카드 생성 -->
            </div>
            <div id="navigation" class="flex justify-between items-center mt-6">
                <button id="prev-btn" class="px-5 py-2 bg-white text-blue-500 rounded-full shadow-md hover:bg-blue-100 transition"><i class="fas fa-arrow-left"></i> 이전</button>
                <span id="card-counter" class="text-gray-600 font-semibold"></span>
                <button id="next-btn" class="px-5 py-2 bg-white text-blue-500 rounded-full shadow-md hover:bg-blue-100 transition">다음 <i class="fas fa-arrow-right"></i></button>
            </div>
             <button id="back-to-stages-btn-learn" class="mt-4 w-full px-5 py-2 bg-gray-200 text-gray-700 rounded-full shadow-md hover:bg-gray-300 transition">단계 선택으로 돌아가기</button>
        </div>

        <!-- 퀴즈 모드 화면 -->
        <div id="quiz-container" class="hidden">
            <div id="quiz-card" class="bg-white rounded-xl shadow-2xl p-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="quiz-title" class="text-xl font-bold text-gray-700"></h2>
                    <span id="quiz-progress" class="font-semibold text-blue-600"></span>
                </div>
                <div id="quiz-question" class="text-center text-2xl md:text-3xl font-bold my-8 text-blue-500 min-h-[80px]"></div>
                <div id="quiz-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
        
        <!-- 퀴즈 결과 화면 -->
        <div id="result-container" class="hidden text-center bg-white rounded-xl shadow-2xl p-8 relative overflow-hidden">
            <div id="confetti-container" class="absolute inset-0"></div>
             <h2 class="text-3xl font-bold text-blue-600 mb-4">🎉 퀴즈 완료! 🎉</h2>
            <p class="text-xl text-gray-700 mb-2">당신의 점수는...</p>
            <p id="score" class="text-6xl font-extrabold text-yellow-500 mb-6"></p>
            <p id="score-message" class="text-lg text-gray-600 mb-6"></p>
            <button id="restart-quiz-btn" class="px-8 py-3 bg-blue-500 text-white font-bold rounded-full shadow-lg transform hover:scale-105 transition duration-300">다른 단계 도전하기 <i class="fas fa-redo"></i></button>
        </div>
    </div>

                { phrasalVerb: "Put off", meaning: "미루다", example: "Never put off until tomorrow what you can do today.", image: "https://placehold.co/600x400/6366F1/FFFFFF?text=Put+Off" },

        let currentMode = 'learn';
        let currentStageIndex = 0;
        let currentCardIndex = 0;
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        const learnContainer = document.getElementById('learn-container');
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        const stageSelectionContainer = document.getElementById('stage-selection-container');
        
        function init() {
            createStageButtons();
            setupModeButtons();
            setupNavigationButtons();
            document.getElementById('restart-quiz-btn').addEventListener('click', showStageSelection);
            document.getElementById('back-to-stages-btn-learn').addEventListener('click', showStageSelection);
        }

        function createStageButtons() {
            const container = document.getElementById('stage-buttons');
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const button = document.createElement('button');
                button.className = 'stage-btn px-4 py-2 bg-white text-gray-600 font-semibold rounded-lg shadow hover:bg-blue-100 transition';
                button.textContent = `Stage ${i}`;
                
                button.addEventListener('click', () => {
                    const stageIndex = i - 1;
                    if (stageIndex >= learningStages.length) {
                        alert('해당 단계는 현재 준비 중입니다. Coming Soon!');
                        return;
                    }
                    currentStageIndex = stageIndex;
                    if (currentMode === 'learn') {
                        startLearning();
                    } else {
                        startQuiz();
                    }
                });
                container.appendChild(button);
            }
        }
        
        function updateActiveStageButton() {
            document.querySelectorAll('.stage-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === currentStageIndex);
            });
        }

        function showStageSelection() {
            stageSelectionContainer.classList.remove('hidden');
            learnContainer.classList.add('hidden');
            quizContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');
        }

        function startLearning() {
            stageSelectionContainer.classList.add('hidden');
            learnContainer.classList.remove('hidden');
            updateActiveStageButton();
            
            const cardContainer = document.getElementById('card-container');
            cardContainer.innerHTML = '';
            const stageVerbs = learningStages[currentStageIndex].verbs;
            stageVerbs.forEach((verb, index) => {
                cardContainer.appendChild(createCard(verb, index));
            });
            currentCardIndex = 0;
            updateLearnView();
        }

        function startQuiz() {
            stageSelectionContainer.classList.add('hidden');
            quizContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            updateActiveStageButton();
            
            const stageData = learningStages[currentStageIndex];
            quizQuestions = [...stageData.verbs].sort(() => 0.5 - Math.random());
            currentQuestionIndex = 0;
            score = 0;
            showQuizQuestion();
        }

        function setupModeButtons() {
            const learnModeBtn = document.getElementById('learn-mode-btn');
            const quizModeBtn = document.getElementById('quiz-mode-btn');
            learnModeBtn.addEventListener('click', () => {
                currentMode = 'learn';
                showStageSelection();
                learnModeBtn.classList.replace('bg-gray-300', 'bg-blue-500');
                learnModeBtn.classList.replace('text-gray-700', 'text-white');
                quizModeBtn.classList.replace('bg-blue-500', 'bg-gray-300');
                quizModeBtn.classList.replace('text-white', 'text-gray-700');
            });

            quizModeBtn.addEventListener('click', () => {
                currentMode = 'quiz';
                showStageSelection();
                quizModeBtn.classList.replace('bg-gray-300', 'bg-blue-500');
                quizModeBtn.classList.replace('text-gray-700', 'text-white');
                learnModeBtn.classList.replace('bg-blue-500', 'bg-gray-300');
                learnModeBtn.classList.replace('text-white', 'text-gray-700');
            });
        }
        
        function speak(text, cardWrapper) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;

            const teacherAvatar = cardWrapper.querySelector('.teacher-avatar');

            utterance.onstart = () => {
                teacherAvatar.classList.add('speaking');
            };
            utterance.onend = () => {
                teacherAvatar.classList.remove('speaking');
            };
            
            speechSynthesis.speak(utterance);
        }

        function createCard(item, index) {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'absolute w-full h-full card-flip hidden';
            cardWrapper.dataset.index = index;

            cardWrapper.innerHTML = `
                <div class="card-face w-full h-full absolute">
                    <div class="bg-white rounded-xl shadow-2xl overflow-hidden text-center h-full flex flex-col">
                        <img src="${item.image}" alt="${item.phrasalVerb}" class="w-full h-64 object-cover" onerror="this.onerror=null;this.src='https://placehold.co/600x400/cccccc/FFFFFF?text=Image+Error';">
                        <div class="p-6 flex-grow flex flex-col justify-center">
                            <h2 class="text-5xl font-extrabold text-blue-600">${item.phrasalVerb}</h2>
                            <p class="text-2xl text-gray-600 mt-2">${item.meaning}</p>
                        </div>
                        <button class="show-example-btn w-full py-3 bg-blue-500 text-white font-bold text-lg">AI 선생님 예문 보기 <i class="fas fa-comment-dots"></i></button>
                    </div>
                </div>
                <div class="card-back card-face w-full h-full absolute">
                    <div class="bg-blue-500 rounded-xl shadow-2xl p-6 h-full flex flex-col justify-center items-center relative">
                        <h3 class="text-3xl font-bold text-white mb-4">${item.phrasalVerb}</h3>
                        <div class="flex items-center w-full">
                            <div class="w-1/3 flex justify-center">
                                <img src="https://placehold.co/150x150/FFFFFF/3B82F6?text=AI+Teacher" alt="AI Teacher" class="teacher-avatar rounded-full border-4 border-white cursor-pointer transform hover:scale-110 transition">
                            </div>
                            <div class="w-2/3 text-left pl-4">
                                <p class="text-xl md:text-2xl text-white italic">"${item.example}"</p>
                            </div>
                        </div>
                        <button class="hide-example-btn absolute top-4 right-4 text-white text-2xl"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `;
            
            cardWrapper.querySelector('.show-example-btn').addEventListener('click', () => cardWrapper.classList.add('is-flipped'));
            cardWrapper.querySelector('.hide-example-btn').addEventListener('click', () => {
                cardWrapper.classList.remove('is-flipped');
                speechSynthesis.cancel();
            });
            cardWrapper.querySelector('.teacher-avatar').addEventListener('click', (e) => {
                e.stopPropagation();
                speak(item.example, cardWrapper);
            });
            return cardWrapper;
        }
        
        function updateLearnView() {
            const stageVerbs = learningStages[currentStageIndex].verbs;
            document.querySelectorAll('#card-container .card-flip').forEach((card, index) => {
                const cardNode = card;
                if(index === currentCardIndex && cardNode.classList.contains('is-flipped')) {
                   cardNode.classList.remove('is-flipped');
                   speechSynthesis.cancel();
                }
                cardNode.classList.toggle('hidden', index !== currentCardIndex);
            });
            document.getElementById('card-counter').textContent = `${currentCardIndex + 1} / ${stageVerbs.length}`;
        }
        
        function setupNavigationButtons() {
            document.getElementById('prev-btn').addEventListener('click', () => {
                const stageVerbs = learningStages[currentStageIndex].verbs;
                currentCardIndex = (currentCardIndex - 1 + stageVerbs.length) % stageVerbs.length;
                updateLearnView();
            });
            
            document.getElementById('next-btn').addEventListener('click', () => {
                const stageVerbs = learningStages[currentStageIndex].verbs;
                currentCardIndex = (currentCardIndex + 1) % stageVerbs.length;
                updateLearnView();
            });
        }
        
        function showQuizQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                showResults(); return;
            }
            const questionData = quizQuestions[currentQuestionIndex];
            const quizType = learningStages[currentStageIndex].quizType;
            const questionEl = document.getElementById('quiz-question');
            const optionsContainer = document.getElementById('quiz-options');
            
            document.getElementById('quiz-progress').textContent = `${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            optionsContainer.innerHTML = '';

            let questionText, correctAnswer;
            const allVerbs = learningStages.flatMap(stage => stage.verbs);

            if (quizType === 'definition') {
                document.getElementById('quiz-title').textContent = '다음 의미에 해당하는 구동사는?';
                questionText = `"${questionData.meaning}"`;
                correctAnswer = questionData.phrasalVerb;
                const options = [correctAnswer];
                while (options.length < 4) {
                    const randomVerb = allVerbs[Math.floor(Math.random() * allVerbs.length)];
                    if (!options.includes(randomVerb.phrasalVerb)) {
                        options.push(randomVerb.phrasalVerb);
                    }
                }
                options.sort(() => 0.5 - Math.random());
                options.forEach(option => createOptionButton(option, correctAnswer));
            } else if (quizType === 'fill-in') {
                document.getElementById('quiz-title').textContent = '빈칸에 알맞은 구동사는?';
                questionText = questionData.example.replace(questionData.phrasalVerb, '_______');
                correctAnswer = questionData.phrasalVerb;
                 const options = [correctAnswer];
                 while (options.length < 4) {
                    const randomVerb = allVerbs[Math.floor(Math.random() * allVerbs.length)];
                    if (!options.includes(randomVerb.phrasalVerb)) {
                        options.push(randomVerb.phrasalVerb);
                    }
                }
                options.sort(() => 0.5 - Math.random());
                 options.forEach(option => createOptionButton(option, correctAnswer));
            } else { // 'meaning'
                document.getElementById('quiz-title').textContent = '다음 구동사의 의미는?';
                questionText = questionData.phrasalVerb;
                correctAnswer = questionData.meaning;
                const options = [correctAnswer];
                while (options.length < 4) {
                    const randomVerb = allVerbs[Math.floor(Math.random() * allVerbs.length)];
                    if (!options.includes(randomVerb.meaning)) {
                        options.push(randomVerb.meaning);
                    }
                }
                options.sort(() => 0.5 - Math.random());
                options.forEach(option => createOptionButton(option, correctAnswer));
            }
             questionEl.textContent = questionText;
        }

        function createOptionButton(option, correctAnswer) {
            const optionsContainer = document.getElementById('quiz-options');
            const button = document.createElement('button');
            button.className = 'p-4 bg-gray-100 rounded-lg text-lg font-semibold text-gray-700 hover:bg-blue-200 hover:text-blue-700 transition duration-200';
            button.textContent = option;
            button.addEventListener('click', () => handleAnswer(option, correctAnswer, button));
            optionsContainer.appendChild(button);
        }

        function handleAnswer(selected, correct, button) {
             document.querySelectorAll('#quiz-options button').forEach(btn => btn.disabled = true);
            if (selected === correct) {
                score++;
                button.classList.add('bg-green-500', 'text-white');
            } else {
                 button.classList.add('bg-red-500', 'text-white');
                 document.querySelectorAll('#quiz-options button').forEach(btn => {
                     if(btn.textContent.trim() === correct) {
                        btn.classList.add('bg-green-500', 'text-white');
                     }
                 });
            }
            setTimeout(() => { currentQuestionIndex++; showQuizQuestion(); }, 1500);
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            const finalScore = (score / quizQuestions.length) * 100;
            document.getElementById('score').textContent = `${finalScore}%`;
            let message = "훌륭해요! 원어민에 한 걸음 더 다가갔어요!";
            if (finalScore < 50) message = "조금 더 노력해볼까요? 다시 도전해보세요!";
            else if (finalScore < 80) message = "좋은 점수예요! 복습하면 완벽해질 거예요.";
            document.getElementById('score-message').textContent = message;

            const confettiContainer = document.getElementById('confetti-container');
            if(confettiContainer) {
                confettiContainer.innerHTML = '';
                if(finalScore > 80){
                    for(let i = 0; i < 50; i++) {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + 'vw';
                        confetti.style.animationDelay = Math.random() * 2 + 's';
                        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                        confettiContainer.appendChild(confetti);
                    }
                }
            }
        }

        init();
        showStageSelection();
    </script>
</body>
</html>
